<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stopwatch</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">
    <div class="card">
      <h1>Stopwatch</h1>

      <!-- Display -->
      <div id="display" class="display">00:00:00.00</div>

      
      <div class="controls">
        <button id="startPauseBtn" class="btn btn-primary">Start</button>
        <button id="lapBtn" class="btn">Lap</button>
        <button id="resetBtn" class="btn">Reset</button>
      </div>

      
      <div class="laps-wrap">
        <h2>Laps</h2>
        <ul id="laps" class="laps"></ul>
      </div>

    </div>
  </div>

 
  <script src="script.js"></script>

</body>
</html>
